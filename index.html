<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist de Tarefas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3; --surface: #ffffff; --surface-2: #f0efe9;
    --border: #e0dfd7; --border-strong: #c8c7be;
    --text: #1a1916; --text-2: #6b6a62; --text-3: #a8a79f;
    --accent: #2d6a4f; --accent-bg: #eaf4ee;
    --danger: #a32d2d; --danger-bg: #fcebeb;
    --blue: #185fa5; --blue-bg: #e6f1fb;
    --amber: #854f0b; --amber-bg: #faeeda;
    --radius: 10px; --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07);
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
  .container { max-width: 700px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .app-header { margin-bottom: 2rem; }
  .app-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
  .app-subtitle { font-size: 13px; color: var(--text-3); margin-top: 2px; }
  .tabs { display: flex; border-bottom: 1.5px solid var(--border); margin-bottom: 1.5rem; }
  .tab { background: none; border: none; border-bottom: 2.5px solid transparent; padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-2); margin-bottom: -1.5px; transition: color 0.15s, border-color 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { border-bottom-color: var(--text); color: var(--text); }
  .date-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .date-info { display: flex; flex-direction: column; }
  .date-main { font-size: 16px; font-weight: 600; color: var(--text); }
  .date-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }
  .date-nav { display: flex; align-items: center; gap: 6px; }
  .nav-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: var(--text-2); transition: background 0.1s, color 0.1s; }
  .nav-btn:hover { background: var(--surface-2); color: var(--text); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-btn-text { width: auto; padding: 0 8px; font-size: 11px; font-weight: 600; }
  .add-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; display: flex; gap: 8px; flex-wrap: wrap; box-shadow: var(--shadow); }
  input[type="text"], select { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
  input[type="text"]:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(45,106,79,0.12); }
  input[type="text"] { flex: 1; min-width: 180px; }
  select { cursor: pointer; }
  .btn { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.1s, transform 0.1s; white-space: nowrap; }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn-outline { background: transparent; color: var(--text-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.1s, color 0.1s; }
  .btn-outline:hover { background: var(--surface-2); color: var(--text); }
  .btn-outline.success { background: var(--accent-bg); color: var(--accent); border-color: #9dd4b3; }
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow); transition: opacity 0.2s; }
  .task-card.done { opacity: 0.5; }
  .task-name { flex: 1; font-size: 14px; color: var(--text); word-break: break-word; }
  .task-name.crossed { text-decoration: line-through; color: var(--text-3); }
  .task-type-badge { font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0; }
  .badge-sn { background: var(--amber-bg); color: var(--amber); }
  .badge-pct { background: var(--blue-bg); color: var(--blue); }
  .sn-group { display: flex; gap: 4px; flex-shrink: 0; }
  .sn-btn { border: 1px solid var(--border); background: transparent; border-radius: var(--radius-sm); padding: 5px 12px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-2); transition: all 0.1s; }
  .sn-btn:hover { background: var(--surface-2); }
  .sn-btn.active-sim { background: var(--accent-bg); border-color: #9dd4b3; color: var(--accent); }
  .sn-btn.active-nao { background: var(--danger-bg); border-color: #f7c1c1; color: var(--danger); }
  .pct-select { border: 1px solid var(--border); background: transparent; border-radius: var(--radius-sm); padding: 5px 8px; font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; flex-shrink: 0; }
  .pct-select.filled { border-color: #85b7eb; background: var(--blue-bg); color: var(--blue); }
  .pct-select.complete { border-color: #9dd4b3; background: var(--accent-bg); color: var(--accent); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-3); font-size: 15px; padding: 4px 6px; border-radius: var(--radius-sm); display: flex; align-items: center; transition: background 0.1s, color 0.1s; flex-shrink: 0; }
  .del-btn:hover { background: var(--danger-bg); color: var(--danger); }
  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-3); }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }
  .progress-area { margin-top: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; box-shadow: var(--shadow); display: none; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-2); margin-bottom: 6px; }
  .progress-pct { font-weight: 600; color: var(--text); font-size: 14px; }
  .progress-track { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
  .save-row { margin-top: 1rem; display: flex; justify-content: flex-end; }
  /* histórico */
  .hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
  .hist-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; transition: background 0.1s; }
  .hist-header:hover { background: var(--surface-2); }
  .hist-date { font-size: 14px; font-weight: 600; color: var(--text); }
  .hist-meta { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .hist-arrow { font-size: 14px; color: var(--text-3); transition: transform 0.2s; display: inline-block; }
  .hist-arrow.open { transform: rotate(180deg); }
  .hist-progress { width: 120px; height: 4px; background: var(--surface-2); border-radius: 2px; overflow: hidden; margin-top: 5px; }
  .hist-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }
  .hist-body { border-top: 1px solid var(--border); padding: 10px 16px; display: none; }
  .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 13px; color: var(--text-2); border-bottom: 1px solid var(--border); }
  .hist-item:last-child { border-bottom: none; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
  .b-sim { background: var(--accent-bg); color: var(--accent); }
  .b-nao { background: var(--danger-bg); color: var(--danger); }
  .b-pct { background: var(--blue-bg); color: var(--blue); }
  .b-zero { background: var(--surface-2); color: var(--text-3); }
  .b-na { background: var(--surface-2); color: var(--text-3); }
  .hist-pct-badge { font-size: 13px; font-weight: 700; color: var(--accent); min-width: 42px; text-align: right; }
  .no-hist { text-align: center; padding: 3rem 1rem; color: var(--text-3); font-size: 14px; }
  /* evolução */
  .evo-filter-bar { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
  .evo-filter-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 16px; font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; transition: all 0.1s; }
  .evo-filter-btn:hover { background: var(--surface-2); color: var(--text); }
  .evo-filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .evo-nav { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .evo-period-label { font-size: 13px; font-weight: 600; color: var(--text); min-width: 160px; text-align: center; }
  .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
  .summary-card-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; margin-bottom: 4px; }
  .summary-card-value { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .summary-card-value.green { color: var(--accent); }
  .summary-card-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); margin-bottom: 1.25rem; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 1rem; }
  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 140px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; gap: 4px; }
  .bar-fill { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); transition: height 0.4s ease; min-height: 2px; position: relative; cursor: default; }
  .bar-fill.low { background: #c8e6c9; }
  .bar-fill.mid { background: #66bb6a; }
  .bar-fill.high { background: var(--accent); }
  .bar-fill .bar-tip { display: none; position: absolute; top: -28px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
  .bar-fill:hover .bar-tip { display: block; }
  .bar-label { font-size: 10px; color: var(--text-3); text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
  .bar-pct { font-size: 10px; color: var(--text-2); font-weight: 600; }
  .detail-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .detail-table table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .detail-table th { background: var(--surface-2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .detail-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-2); vertical-align: middle; }
  .detail-table tr:last-child td { border-bottom: none; }
  .detail-table tr:hover td { background: var(--surface-2); }
  .td-name { color: var(--text); font-weight: 500; }
  .mini-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .mini-bar-track { flex: 1; height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; min-width: 60px; }
  .mini-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }
  .td-pct { font-weight: 700; color: var(--accent); text-align: right; white-space: nowrap; }
  .evo-empty { text-align: center; padding: 3rem 1rem; color: var(--text-3); font-size: 14px; }
  .detail-collapsible { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  .detail-toggle { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; background: none; border: none; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text); transition: background 0.1s; }
  .detail-toggle:hover { background: var(--surface-2); }
  .detail-arrow { font-size: 14px; color: var(--text-3); transition: transform 0.2s; display: inline-block; }
  .detail-arrow.open { transform: rotate(180deg); }
  .detail-body { border-top: 1px solid var(--border); }
  @media (max-width: 480px) {
    .add-section { flex-direction: column; }
    input[type="text"] { min-width: unset; }
    .task-card { flex-wrap: wrap; gap: 8px; }
    .evo-filter-bar { gap: 4px; }
    .evo-period-label { min-width: 120px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="app-header">
    <div class="app-title">&#x2713; Checklist</div>
    <div class="app-subtitle">Registro e acompanhamento de tarefas diárias</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('hoje')" id="tab-hoje">Hoje</button>
    <button class="tab" onclick="showTab('historico')" id="tab-historico">Histórico</button>
    <button class="tab" onclick="showTab('evolucao')" id="tab-evolucao">Evolução</button>
  </div>

  <!-- HOJE -->
  <div id="view-hoje">
    <div class="date-bar">
      <div class="date-info">
        <span class="date-main" id="date-main">—</span>
        <span class="date-sub" id="date-sub">—</span>
      </div>
      <div class="date-nav">
        <button class="nav-btn" onclick="changeDay(-1)" title="Dia anterior">&#8249;</button>
        <button class="nav-btn nav-btn-text" onclick="goToday()">Hoje</button>
        <button class="nav-btn" onclick="changeDay(1)" id="btn-next" title="Próximo dia">&#8250;</button>
      </div>
    </div>
    <div class="add-section">
      <input type="text" id="new-task-name" placeholder="Nome da nova tarefa..." onkeydown="if(event.key==='Enter') addTask()" />
      <select id="new-task-type">
        <option value="sn">Tipo: Sim / Não</option>
        <option value="pct">Tipo: Percentual</option>
      </select>
      <button class="btn" onclick="addTask()">+ Adicionar</button>
    </div>
    <div id="task-list" class="task-list"></div>
    <div class="progress-area" id="progress-area">
      <div class="progress-row">
        <span>Progresso do dia</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="save-row">
      <button class="btn-outline" id="save-btn" onclick="saveDay()">&#128190; Salvar registro do dia</button>
    </div>
  </div>

  <!-- HISTÓRICO -->
  <div id="view-historico" style="display:none;">
    <div id="history-list"></div>
  </div>

  <!-- EVOLUÇÃO -->
  <div id="view-evolucao" style="display:none;">
    <div class="evo-filter-bar">
      <button class="evo-filter-btn active" id="evo-btn-semana" onclick="setEvoPeriod('semana')">Semanal</button>
      <button class="evo-filter-btn" id="evo-btn-mes" onclick="setEvoPeriod('mes')">Mensal</button>
      <button class="evo-filter-btn" id="evo-btn-ano" onclick="setEvoPeriod('ano')">Anual</button>
      <div class="evo-nav">
        <button class="nav-btn" onclick="evoNav(-1)">&#8249;</button>
        <span class="evo-period-label" id="evo-period-label">—</span>
        <button class="nav-btn" onclick="evoNav(1)" id="evo-btn-fwd">&#8250;</button>
      </div>
    </div>
    <div id="evo-content"></div>
  </div>
</div>

<script>
const DAYS = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const DAYS_S = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const MONTHS_S = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let currentDate = today();
let tasks = [];
let history = {};
let evoPeriod = 'semana';
let evoOffset = 0;

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function dateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function formatFull(d) { return DAYS[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()]+' de '+d.getFullYear(); }
function formatShort(d) { return DAYS[d.getDay()].slice(0,3)+', '+d.getDate()+' '+MONTHS_S[d.getMonth()]+' '+d.getFullYear(); }

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function loadState() {
  try {
    const raw = localStorage.getItem('checklist_v2');
    if (raw) { const s = JSON.parse(raw); tasks = s.tasks||[]; history = s.history||{}; }
  } catch(e) { tasks=[]; history={}; }
}

function persist() { localStorage.setItem('checklist_v2', JSON.stringify({tasks, history})); }

function getDayData() {
  const k = dateKey(currentDate);
  if (!history[k]) history[k] = {values:{}, saved:false, snapshot:null};
  return history[k];
}

function scoreEntry(entry, snap) {
  const s = snap || entry.snapshot || tasks;
  let score = 0;
  s.forEach(t => {
    const v = (entry.values||{})[t.id];
    if (t.type==='sn') { if (v==='sim') score+=1; }
    else { score += (parseInt(v)||0)/100; }
  });
  return { score, total: s.length, pct: s.length ? Math.round((score/s.length)*100) : 0 };
}

function addTask() {
  const inp = document.getElementById('new-task-name');
  const name = inp.value.trim();
  if (!name) { inp.focus(); return; }
  const type = document.getElementById('new-task-type').value;
  tasks.push({id: Date.now(), name, type});
  inp.value=''; inp.focus();
  persist(); renderTasks();
}



function computeScore() {
  if (!tasks.length) return {score:0, total:0, pct:0};
  const data = getDayData();
  let score = 0;
  tasks.forEach(t => {
    const v = data.values[t.id];
    if (t.type==='sn') { if (v==='sim') score+=1; }
    else { score += (parseInt(v)||0)/100; }
  });
  const total = tasks.length;
  return {score, total, pct: Math.round((score/total)*100)};
}

function renderTasks() {
  const list = document.getElementById('task-list');
  const prog = document.getElementById('progress-area');
  if (!tasks.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x2713;</div><p>Nenhuma tarefa cadastrada.<br>Adicione tarefas no campo acima.</p></div>';
    prog.style.display='none'; return;
  }
  const data = getDayData();
  list.innerHTML = tasks.map(t => {
    const v = data.values[t.id];
    let control='', done=false;
    if (t.type==='sn') {
      done = v==='sim';
      control = '<div class="sn-group">'
        + '<button class="sn-btn ' + (v==='sim'?'active-sim':'') + '" data-id="' + t.id + '" data-val="sim">Sim</button>'
        + '<button class="sn-btn ' + (v==='nao'?'active-nao':'') + '" data-id="' + t.id + '" data-val="nao">Não</button>'
        + '</div>';
    } else {
      const p = parseInt(v)||0; done = p===100;
      const cls = p===100?'complete':(p>0?'filled':'');
      control = '<select class="pct-select ' + cls + '" data-id="' + t.id + '">'
        + '<option value="0"'+(p===0?' selected':'')+'>0%</option>'
        + '<option value="25"'+(p===25?' selected':'')+'>25%</option>'
        + '<option value="50"'+(p===50?' selected':'')+'>50%</option>'
        + '<option value="75"'+(p===75?' selected':'')+'>75%</option>'
        + '<option value="100"'+(p===100?' selected':'')+'>100%</option>'
        + '</select>';
    }
    const badge = t.type==='sn'
      ? '<span class="task-type-badge badge-sn">S/N</span>'
      : '<span class="task-type-badge badge-pct">%</span>';
    return '<div class="task-card ' + (done?'done':'') + '">'
      + badge
      + '<span class="task-name ' + (done?'crossed':'') + '">' + escHtml(t.name) + '</span>'
      + control
      + '<button class="del-btn" data-id="' + t.id + '" title="Remover">&#x2715;</button>'
      + '</div>';
  }).join('');

  list.querySelectorAll('.del-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const id = Number(this.getAttribute('data-id'));
      if (!confirm('Remover esta tarefa do checklist?')) return;
      tasks = tasks.filter(function(t) { return t.id !== id; });
      persist(); renderTasks();
    });
  });
  list.querySelectorAll('.sn-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const id = Number(this.getAttribute('data-id'));
      const val = this.getAttribute('data-val');
      const d = getDayData(); d.values[id] = val;
      persist(); renderTasks();
    });
  });
  list.querySelectorAll('.pct-select').forEach(function(sel) {
    sel.addEventListener('change', function() {
      const id = Number(this.getAttribute('data-id'));
      const d = getDayData(); d.values[id] = this.value;
      persist(); renderTasks();
    });
  });

  const res = computeScore();
  prog.style.display='block';
  document.getElementById('progress-fill').style.width = res.pct+'%';
  document.getElementById('progress-pct').textContent = res.pct+'%';
}

function saveDay() {
  const d = getDayData();
  d.saved=true; d.savedAt=new Date().toISOString();
  d.snapshot=tasks.map(t=>({id:t.id,name:t.name,type:t.type}));
  persist();
  const btn = document.getElementById('save-btn');
  btn.classList.add('success'); btn.textContent='✓ Salvo com sucesso!';
  setTimeout(()=>{ btn.classList.remove('success'); btn.innerHTML='&#128190; Salvar registro do dia'; }, 2000);
}

function changeDay(dir) {
  const d = new Date(currentDate); d.setDate(d.getDate()+dir); currentDate=d;
  updateDateUI(); renderTasks();
}

function goToday() { currentDate=today(); updateDateUI(); renderTasks(); }

function updateDateUI() {
  const t = today();
  const diff = Math.round((currentDate-t)/86400000);
  let sub = diff===0?'Hoje':diff===-1?'Ontem':diff===1?'Amanhã':diff<0?Math.abs(diff)+' dias atrás':'Daqui '+diff+' dias';
  document.getElementById('date-main').textContent = formatFull(currentDate);
  document.getElementById('date-sub').textContent = sub;
  document.getElementById('btn-next').disabled = currentDate>=t;
}

function showTab(tab) {
  ['hoje','historico','evolucao'].forEach(v => {
    document.getElementById('view-'+v).style.display = v===tab?'':'none';
    document.getElementById('tab-'+v).classList.toggle('active', v===tab);
  });
  if (tab==='historico') renderHistory();
  if (tab==='evolucao') { evoOffset=0; renderEvo(); }
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const keys = Object.keys(history).filter(k=>history[k]&&history[k].saved).sort().reverse();
  if (!keys.length) {
    list.innerHTML=`<div class="no-hist"><div style="font-size:32px;margin-bottom:8px">&#128337;</div><p>Nenhum dia salvo ainda.<br>Preencha o checklist e clique em "Salvar registro do dia".</p></div>`;
    return;
  }
  list.innerHTML = keys.map((k,idx)=>{
    const entry=history[k];
    const d=new Date(k+'T00:00:00');
    const snap=entry.snapshot||tasks;
    const {score,total,pct}=scoreEntry(entry,snap);
    const bodyId='hb-'+idx, arrowId='ha-'+idx;
    const items = snap.map(t=>{
      const v=(entry.values||{})[t.id];
      let badge='';
      if (t.type==='sn') {
        badge = v==='sim'?'<span class="badge b-sim">Sim</span>':v==='nao'?'<span class="badge b-nao">Não</span>':'<span class="badge b-na">—</span>';
      } else {
        const p=parseInt(v)||0;
        badge=`<span class="badge ${p>0?'b-pct':'b-zero'}">${p}%</span>`;
      }
      return `<div class="hist-item"><span>${escHtml(t.name)}</span>${badge}</div>`;
    }).join('');
    return `<div class="hist-card">
      <div class="hist-header" onclick="toggleHist('${bodyId}','${arrowId}')">
        <div>
          <div class="hist-date">${formatShort(d)}</div>
          <div class="hist-meta">${total} tarefas &middot; ${Math.round(score*10)/10} concluídas</div>
          <div class="hist-progress"><div class="hist-progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="hist-pct-badge">${pct}%</span>
          <span class="hist-arrow" id="${arrowId}">&#8964;</span>
        </div>
      </div>
      <div class="hist-body" id="${bodyId}">${items}</div>
    </div>`;
  }).join('');
}

function toggleHist(bodyId, arrowId) {
  const body=document.getElementById(bodyId), arrow=document.getElementById(arrowId);
  const open = body.style.display!=='block';
  body.style.display=open?'block':'none';
  arrow.classList.toggle('open',open);
}

/* ---- EVOLUÇÃO ---- */

function setEvoPeriod(p) {
  evoPeriod=p; evoOffset=0;
  ['semana','mes','ano'].forEach(x=>{
    document.getElementById('evo-btn-'+x).classList.toggle('active', x===p);
  });
  renderEvo();
}

function evoNav(dir) { evoOffset+=dir; renderEvo(); }

function getWeekRange(offset) {
  const t = today();
  const dow = t.getDay();
  const sunday = new Date(t); sunday.setDate(t.getDate()-dow+(offset*7));
  const saturday = new Date(sunday); saturday.setDate(sunday.getDate()+6);
  return {start:sunday, end:saturday};
}

function getMonthRange(offset) {
  const t = today();
  const start = new Date(t.getFullYear(), t.getMonth()+offset, 1);
  const end = new Date(t.getFullYear(), t.getMonth()+offset+1, 0);
  return {start, end};
}

function getYearRange(offset) {
  const y = today().getFullYear()+offset;
  return {start: new Date(y,0,1), end: new Date(y,11,31)};
}

function daysInRange(start, end) {
  const days=[]; const d=new Date(start);
  while (d<=end) { days.push(dateKey(d)); d.setDate(d.getDate()+1); }
  return days;
}

function periodLabel() {
  if (evoPeriod==='semana') {
    const {start,end}=getWeekRange(evoOffset);
    return start.getDate()+'/'+String(start.getMonth()+1).padStart(2,'0')+' – '+end.getDate()+'/'+String(end.getMonth()+1).padStart(2,'0')+'/'+end.getFullYear();
  }
  if (evoPeriod==='mes') {
    const {start}=getMonthRange(evoOffset);
    return MONTHS[start.getMonth()].charAt(0).toUpperCase()+MONTHS[start.getMonth()].slice(1)+' '+start.getFullYear();
  }
  const {start}=getYearRange(evoOffset);
  return String(start.getFullYear());
}

function renderEvo() {
  const t = today();
  let range, barData=[], tableData=[];

  if (evoPeriod==='semana') {
    range = getWeekRange(evoOffset);
    const days = daysInRange(range.start, range.end);
    barData = days.map(k=>{
      const entry=history[k];
      if (!entry||!entry.saved) return {label: labelForKey(k,'dia'), pct:null, key:k};
      const {pct}=scoreEntry(entry);
      return {label: labelForKey(k,'dia'), pct, key:k};
    });
  } else if (evoPeriod==='mes') {
    range = getMonthRange(evoOffset);
    const days = daysInRange(range.start, range.end);
    // agrupar por semana do mês
    const weeks={};
    days.forEach(k=>{
      const d=new Date(k+'T00:00:00');
      const wn = Math.ceil(d.getDate()/7);
      if (!weeks[wn]) weeks[wn]={keys:[], label:'Sem '+wn};
      weeks[wn].keys.push(k);
    });
    barData = Object.values(weeks).map(w=>{
      const saved=w.keys.filter(k=>history[k]&&history[k].saved);
      if (!saved.length) return {label:w.label, pct:null};
      const avg=saved.reduce((a,k)=>a+scoreEntry(history[k]).pct,0)/saved.length;
      return {label:w.label, pct:Math.round(avg)};
    });
  } else {
    range = getYearRange(evoOffset);
    for (let m=0;m<12;m++) {
      const start=new Date(range.start.getFullYear(),m,1);
      const end=new Date(range.start.getFullYear(),m+1,0);
      const days=daysInRange(start,end);
      const saved=days.filter(k=>history[k]&&history[k].saved);
      if (!saved.length) { barData.push({label:MONTHS_S[m], pct:null}); continue; }
      const avg=saved.reduce((a,k)=>a+scoreEntry(history[k]).pct,0)/saved.length;
      barData.push({label:MONTHS_S[m], pct:Math.round(avg)});
    }
  }

  // stats
  const validBars = barData.filter(b=>b.pct!==null);
  const avgPct = validBars.length ? Math.round(validBars.reduce((a,b)=>a+b.pct,0)/validBars.length) : null;
  const maxPct = validBars.length ? Math.max(...validBars.map(b=>b.pct)) : null;
  const minPct = validBars.length ? Math.min(...validBars.map(b=>b.pct)) : null;
  const diasSalvos = validBars.length;

  // tabela por tarefa — funciona nos 3 modos
  let taskTableHTML = '';
  const allSavedDays = daysInRange(range.start, range.end).filter(k=>history[k]&&history[k].saved);
  if (allSavedDays.length) {
    const taskMap = {};
    allSavedDays.forEach(k=>{
      const entry = history[k];
      const snap = entry.snapshot || tasks;
      snap.forEach(t=>{
        if (!taskMap[t.id]) taskMap[t.id] = {name:t.name, type:t.type, scores:[]};
        const v = (entry.values||{})[t.id];
        let s = 0;
        if (t.type==='sn') s = v==='sim' ? 1 : 0;
        else s = (parseInt(v)||0)/100;
        taskMap[t.id].scores.push(s);
      });
    });
    const rows = Object.values(taskMap).sort((a,b)=>{
      const pa = Math.round((a.scores.reduce((x,y)=>x+y,0)/a.scores.length)*100);
      const pb = Math.round((b.scores.reduce((x,y)=>x+y,0)/b.scores.length)*100);
      return pb - pa;
    }).map(t=>{
      const avg = t.scores.reduce((a,b)=>a+b,0) / t.scores.length;
      const pct = Math.round(avg*100);
      const barColor = pct>=75?'var(--accent)':pct>=40?'#66bb6a':'#c8e6c9';
      return `<tr>
        <td class="td-name">${escHtml(t.name)}</td>
        <td><span class="task-type-badge ${t.type==='sn'?'badge-sn':'badge-pct'}">${t.type==='sn'?'S/N':'%'}</span></td>
        <td><div class="mini-bar-wrap"><div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${barColor}"></div></div></div></td>
        <td class="td-pct">${pct}%</td>
      </tr>`;
    }).join('');
    taskTableHTML = `
      <div class="detail-collapsible">
        <button class="detail-toggle" onclick="toggleTaskDetail(this)" aria-expanded="false">
          <span>&#128203; Detalhe por tarefa</span>
          <span class="detail-arrow">&#8964;</span>
        </button>
        <div class="detail-body" style="display:none;">
          <div class="detail-table">
            <table>
              <thead><tr><th>Tarefa</th><th>Tipo</th><th>Média do período</th><th style="text-align:right">%</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      </div>`;
  }

  // bloquear nav futuro
  const isFuture = evoOffset >= 0;
  document.getElementById('evo-btn-fwd').disabled = isFuture;

  document.getElementById('evo-period-label').textContent = periodLabel();

  const bars = barData.map(b=>{
    const barCls = b.pct===null?'':(b.pct<40?'low':b.pct<70?'mid':'high');
    const tipText = b.pct!==null ? b.pct+'%' : 'sem registro';
    return `<div class="bar-col">
      <span class="bar-pct">${b.pct!==null?b.pct+'%':''}</span>
      <div class="bar-fill ${barCls}" style="height:${b.pct!==null?Math.max(Math.round((b.pct/100)*120),2):2}px;${b.pct===null?'background:var(--border);opacity:0.4':''}">
        <span class="bar-tip">${tipText}</span>
      </div>
      <span class="bar-label">${b.label}</span>
    </div>`;
  }).join('');

  const noData = validBars.length===0;

  document.getElementById('evo-content').innerHTML = noData
    ? `<div class="evo-empty"><div style="font-size:32px;margin-bottom:8px">&#128202;</div><p>Nenhum registro salvo neste período.<br>Salve o checklist diário para ver a evolução aqui.</p></div>`
    : `<div class="summary-cards">
        <div class="summary-card">
          <div class="summary-card-label">Média geral</div>
          <div class="summary-card-value green">${avgPct}%</div>
          <div class="summary-card-sub">do período</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">Melhor resultado</div>
          <div class="summary-card-value">${maxPct}%</div>
          <div class="summary-card-sub">máximo registrado</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">Menor resultado</div>
          <div class="summary-card-value">${minPct}%</div>
          <div class="summary-card-sub">mínimo registrado</div>
        </div>
        <div class="summary-card">
          <div class="summary-card-label">Dias salvos</div>
          <div class="summary-card-value">${diasSalvos}</div>
          <div class="summary-card-sub">registros no período</div>
        </div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Percentual de conclusão — ${periodLabel()}</div>
        <div class="bar-chart">${bars}</div>
      </div>
      ${taskTableHTML}`;
}

function toggleTaskDetail(btn) {
  const body = btn.nextElementSibling;
  const arrow = btn.querySelector('.detail-arrow');
  const open = body.style.display !== 'block';
  body.style.display = open ? 'block' : 'none';
  arrow.classList.toggle('open', open);
  btn.setAttribute('aria-expanded', open);
}

function labelForKey(k, type) {
  const d = new Date(k+'T00:00:00');
  return DAYS_S[d.getDay()]+' '+d.getDate();
}

loadState();
updateDateUI();
renderTasks();
</script>
